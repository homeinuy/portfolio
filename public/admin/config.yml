backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "desarrollos"
    label: "Proyectos Inmobiliarios"
    folder: "src/content/desarrollos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre del proyecto", name: "title", widget: "string" }
      - { label: "Descripcion corta", name: "description", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Imagen principal", name: "image", widget: "image", required: false }
      - { label: "Ubicacion", name: "location", widget: "string", required: false, hint: "Ej: Punta del Este, Uruguay" }
      - { label: "Estado", name: "status", widget: "select", required: false, options: ["En pozo", "En construccion", "Terminado", "Entrega inmediata"], default: "En construccion" }
      - { label: "YouTube Video ID", name: "youtubeId", widget: "string", required: false, hint: "Solo el ID del video. Ej: si la URL es youtube.com/watch?v=abc123, pone abc123" }
      - { label: "Latitud", name: "lat", widget: "number", required: false, value_type: "float", hint: "Ej: -34.9467 (usa Google Maps para obtenerla)" }
      - { label: "Longitud", name: "lng", widget: "number", required: false, value_type: "float", hint: "Ej: -54.9358 (usa Google Maps para obtenerla)" }
      - { label: "Destacado en inicio", name: "featured", widget: "boolean", default: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Servicios"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Tech Stack", name: "tech", widget: "list", required: false }
      - { label: "Live URL", name: "liveUrl", widget: "string", required: false }
      - { label: "Repo URL", name: "repoUrl", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
